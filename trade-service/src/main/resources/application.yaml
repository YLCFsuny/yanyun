server:
  port: 8085
hm:
  db:
    database:hm-trade
  swagger:
    title: "彦云商城商品接口文档"
    package: com.hmall.trade.controller

seata:
  enabled: false
  registry: # TC服务注册中心的配置，微服务根据这些信息去注册中心获取tc服务地址
    type: nacos # 注册中心类型 nacos
    nacos:
      server-addr: 192.168.100.128:8848 # nacos地址
#      server-addr: localhost:8848
      namespace: "" # namespace，默认为空
      group: DEFAULT_GROUP # 分组，默认是DEFAULT_GROUP
      application: seata-server # seata服务名称
      username: nacos
      password: nacos
  application-id: trade-service # 改为各自的服务名
  tx-service-group: hmall # 事务组名称
  service:
    vgroup-mapping: # 事务组与tc集群的映射关系
      hmall: "default"
#  data-source-proxy-mode: XA   //默认 AT 模式



spring:
  rabbitmq:
    host: 192.168.100.128
    port: 5672
    virtual-host: /hmall
    username: hmall
    password: ${HM_MQ_PASSWORD:123}
    listener:
      simple:
        prefetch: 1
        acknowledge-mode: auto
        retry:
          enabled: true  # 开启消费者失败重试功能
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 1.0
          stateless: false # 有状态重试，支持事务
#          stateless: true # 无状态重试，不支持事务
        default-requeue-rejected: false  # 重试耗尽后不重新入队

  redis:
    host: localhost
    port: 6379
    password:  # 如果有密码
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  application:
    name: trade-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://192.168.100.128:3366/hm-trade?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
#    url: jdbc:mysql://${hm.db.host}:3306/hmall?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
#    url: jdbc:mysql://localhost:3306/hm-trade
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${HM_DB_PASSWORD:123}
#  cloud:
#    nacos:
#      server-addr: 192.168.100.128:8848
#    #      server-addr: localhost:8848
mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
logging:
  level:
    com.hmall: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"
knife4j:
  enable: true
  openapi:
    title: 彦云商城交易接口文档
    description: "彦云商城交易接口文档"
    email: zhanghuyi@itcast.cn
    concat: 虎哥
    url: https://www.itcast.cn
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.hmall.trade.controller

