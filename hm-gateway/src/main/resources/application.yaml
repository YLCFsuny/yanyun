server:
  port: 8080

###########################################
spring:
  application:
    name: gateway
  cloud:
#    nacos:
#      server-addr: 192.168.100.128:8848
#      server-addr: localhost:8848
    gateway:
      routes:
        - id: item-service
          uri: lb://item-service
          predicates:
            - Path=/item/**, /search/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**, /addresses/**

        - id: trade-service
          uri: lb://trade-service
          predicates:
            - Path=/orders/**
        - id: pay-service
          uri: lb://pay-service
          predicates:
            - Path=/pay-orders/**
        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/carts/**
      default-filters:
        - AddRequestHeader=truth, 100
        - PrintAny=1,2,3
###########################################
hm:
  jwt:
    location: classpath:hmall.jks
    alias: hmall
    password: ${HM_JK_PASSWORD:hmall123}
    tokenTTL: 30m
  auth:
    excludePaths:
      - /search/**
      - /users/login
      - /items/**
      - /hi