spring:
  application:
    name: cart-service
  profiles:
    active: dev
  cloud:
    nacos:
#      server-addr: localhost:8848
      server-addr: 192.168.100.128:8848
      config:
        file-extension: yaml
        shared-configs:
          - data-id: shared-jdbc.yaml
          - data-id: shared-log.yaml
          - data-id: shared-swagger.yaml
          - data-id: shared-seata.yaml


    sentinel:
      transport:
        dashboard: localhost:8090  # sentinel控制台地址
      http-method-specify: true    # 针对每个请求单独配置
