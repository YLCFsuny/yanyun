server:
  port: 8082
hm:
  cart:
    maxItems: 10
  db:
    database: db03
  swagger:
    title: "彦云商城购物车接口文档"
    desc: "彦云商城购物车接口文档"
    package:
      - com.hmall.cart.controller

seata:
  registry: # TC服务注册中心的配置，微服务根据这些信息去注册中心获取tc服务地址
    type: nacos # 注册中心类型 nacos
    nacos:
      server-addr: 192.168.100.128:8848 # nacos地址
      #      server-addr: localhost:8848
      namespace: "" # namespace，默认为空
      group: DEFAULT_GROUP # 分组，默认是DEFAULT_GROUP
      application: seata-server # seata服务名称
      username: nacos
      password: nacos
  application-id: cart-service # 改为各自的服务名
  tx-service-group: hmall # 事务组名称
  service:
    vgroup-mapping: # 事务组与tc集群的映射关系
      hmall: "default"
      #  data-source-proxy-mode: XA   //默认 AT 模式

#arthas:
#  tunnel-server: ws://127.0.0.1:9999/ws
#  app-name: ${spring.application.name}
#  http-port: 8888
#  telnet-port: 9999

feign:
  okhttp:
    enabled: true # 开启OKHttp功能
#  sentinel:
#    enabled: true # 开启Sentinel功能，将Feign请求（FeignClient）注册为Sentinel的簇点资源

#  tomcat:
#    threads:
#      max: 20
#    accept-count: 20
#    max-connections: 50

######################
spring:
#  main:
#    jvm-arguments:
#      - add-opens java.base/java.lang=ALL-UNNAMED
#      - add-opens java.base/java.lang.reflect=ALL-UNNAMED
  application:
    name: cart-service
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://192.168.100.128:3366/hm-cart?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
#    url: jdbc:mysql://${hm.db.host}:3306/hmall?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
#    url: jdbc:mysql://localhost:3306/hm-cart
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${HM_DB_PASSWORD:123}
    #####################
  cloud:
    sentinel:
      transport:
        dashboard: localhost:8090  # sentinel控制台地址
      http-method-specify: true    # 针对每个请求单独配置
#    nacos:
##      server-addr: 192.168.100.128:8848
#      server-addr: localhost:8848
eureka:
  client:
    service-url:
      defaultZone: http://127.0.0.1:10086/eureka
    #####################
mybatis-plus:
  configuration:
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      update-strategy: not_null
      id-type: auto
#####################
logging:
  level:
    com.hmall: debug
  pattern:
    dateformat: HH:mm:ss:SSS
  file:
    path: "logs/${spring.application.name}"
#####################
knife4j:
  enable: true
  openapi:
    title: 彦云商城购物车接口文档
    description: "彦云商城购物车接口文档"
    email: zhanghuyi@itcast.cn
    concat: 虎哥
    url: https://www.itcast.cn
    version: v1.0.0
    group:
      default:
        group-name: default
        api-rule: package
        api-rule-resources:
          - com.hmall.cart.controller
